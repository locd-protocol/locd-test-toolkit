name: Security Audit

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run cargo-audit
      run: cargo audit

    - name: Run locd-audit scan
      run: cargo run -p locd-audit -- scan

    - name: Run locd-audit timing
      run: cargo run -p locd-audit -- timing --samples 500
